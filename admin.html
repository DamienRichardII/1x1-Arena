<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin — 1X1 ARENA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/admin.css"/>
</head>
<body>

<!-- Login overlay -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <img class="login-logo" src="assets/Logo-1x1.png" alt="1X1 Arena"/>
    <h1 class="login-title">Admin <span class="grad">Panel</span></h1>
    <p class="login-sub">Accès réservé à l'équipe 1X1 Arena</p>
    <div class="login-form">
      <label class="field">
        <span class="field__label">Mot de passe</span>
        <input id="adminPwd" type="password" placeholder="Mot de passe admin" autocomplete="current-password"/>
      </label>
      <button id="loginBtn" class="btn btn--primary btn--lg">Connexion</button>
      <p id="loginError" class="login-error" hidden>Mot de passe incorrect</p>
    </div>
  </div>
</div>

<!-- Admin Dashboard -->
<div id="adminDashboard" class="dashboard" hidden>
  <header class="dash-header">
    <div class="dash-header__inner">
      <a class="brand" href="index.html">
        <img class="brand__logo" src="assets/Logo-1x1.png" alt="1X1 Arena"/>
        <span class="brand__name">1X1 ARENA</span>
      </a>
      <div class="dash-header__right">
        <span class="dash-header__tag">ADMIN</span>
        <button id="logoutBtn" class="btn btn--ghost btn--sm">Déconnexion</button>
      </div>
    </div>
  </header>

  <main class="dash-main">
    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-card__label">Total inscrits</div>
        <div class="stat-card__value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Avec vidéo</div>
        <div class="stat-card__value" id="statVideo">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Dernière inscription</div>
        <div class="stat-card__value" id="statLast">—</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="dash-actions">
      <h2 class="dash-title">Inscriptions <span class="grad">Arena Tournament</span></h2>
      <div class="dash-actions__right">
        <button id="refreshBtn" class="btn btn--ghost btn--sm">Rafraîchir</button>
        <button id="exportPdfBtn" class="btn btn--primary btn--sm">Exporter PDF</button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table class="data-table" id="inscTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Prénom</th>
            <th>Nom</th>
            <th>Pseudo</th>
            <th>Email</th>
            <th>Téléphone</th>
            <th>Âge</th>
            <th>Ville</th>
            <th>Taille</th>
            <th>Poids</th>
            <th>Vidéo</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="inscBody">
          <tr><td colspan="12" class="table-empty">Chargement…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Video viewer modal -->
    <div id="videoModal" class="modal" hidden>
      <div class="modal__backdrop"></div>
      <div class="modal__content">
        <div class="modal__header">
          <h3 id="modalTitle">Vidéo</h3>
          <button id="modalClose" class="modal__close">&times;</button>
        </div>
        <div class="modal__body">
          <a id="modalLink" href="#" target="_blank" rel="noopener" class="btn btn--primary btn--sm">Ouvrir le lien</a>
          <div id="modalEmbed" class="modal__embed"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
